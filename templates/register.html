<!DOCTYPE html>
<html>
<head>
    <title>Register - Student Score Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #edf2ff, #f4f6fb);
            min-height: 100vh;
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
        }
        .card {
            max-width: 420px;
            margin: 80px auto;
            padding: 36px;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 24px 80px rgba(42,74,153,0.13);
        }
        .logo {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 6px;
        }
        h2 {
            text-align: center;
            margin-bottom: 6px;
            font-weight: 800;
            color: #1f2e55;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            margin-bottom: 14px;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid #dfe3ee;
            background: #f9fbff;
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: #6c7bf7;
            box-shadow: 0 0 0 4px rgba(103,126,250,0.12);
        }
        .btn-primary {
            width: 100%;
            border-radius: 12px;
            padding: 13px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.92; }
        .divider {
            text-align: center;
            color: #aaa;
            margin: 18px 0;
            font-size: 0.9rem;
        }
        .btn-login {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #667eea;
            color: white;
        }
        .alert-danger {
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            background: #fdecea;
            color: #9b2c2c;
            border: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎓</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join Student Score Predictor</p>

        {% if error %}
            <div class="alert-danger">❌ {{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <input type="text" name="username" class="form-control" placeholder="👤 Choose Username" required>
            <input type="password" name="password" class="form-control" placeholder="🔒 Choose Password" required>
            <button type="submit" class="btn-primary">Create Account →</button>
        </form>

        <div class="divider">— Already have an account? —</div>
        <a href="/login" class="btn-login">Sign In</a>
    </div>
</body>
</html>
